<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:,">
<meta name="theme-color" content="#0d6efd">

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
  padding:8px;
  color:#111;
}

.header {
  background:#0d6efd;
  color:white;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
}

.header h2 {
  margin:0;
  font-size:16px;
}

.card, .total-box, .venta-card {
  background:white;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card { padding:8px; margin-bottom:8px; }

label {
  font-weight:bold;
  display:block;
  margin-top:5px;
  font-size:12px;
}

input, button, select {
  width:100%;
  padding:8px;
  margin-top:4px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.secundario { background:#6c757d; }
.danger { background:#dc3545; }
.warning { background:#ffc107; color:#111; }

.botones {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.botones button { flex:1; }

.status {
  margin-top:5px;
  font-size:12px;
  color:#198754;
  font-weight:bold;
}

.total-box {
  padding:8px;
  margin-bottom:8px;
}

.total-label { font-size:12px; color:#555; }
.total-valor { color:#0d6efd; font-size:20px; font-weight:bold; }
.total-info { font-size:12px; color:#555; }

.lista {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.venta-card { padding:9px; }

.venta-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:5px;
}

.venta-folio { font-size:14px; font-weight:bold; }
.venta-fecha { font-size:12px; color:#666; }

.venta-cliente {
  font-size:14px;
  font-weight:bold;
  margin-bottom:4px;
  line-height:1.2;
}

.venta-producto {
  font-size:13px;
  color:#333;
  line-height:1.2;
  margin-bottom:6px;
}

.venta-datos {
  display:flex;
  gap:12px;
  margin-bottom:6px;
  font-size:13px;
  flex-wrap:wrap;
}

.dato { font-size:12px; }

.dato b {
  display:inline;
  font-weight:normal;
  color:#666;
  margin-right:4px;
}

.total { color:#0d6efd; font-weight:bold; }

.venta-vendedor {
  font-size:11px;
  color:#666;
  line-height:1.2;
}

.acciones-link {
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.btn-copy {
  display:inline-block;
  text-decoration:none;
  color:white;
  padding:6px 10px;
  border-radius:7px;
  font-size:12px;
  font-weight:bold;
  line-height:1;
  white-space:nowrap;
  border:none;
  width:auto;
  margin-top:0;
  background:#6c757d;
  cursor:pointer;
}

.oculto { display:none; }

.usuario-box {
  font-size:12px;
  color:#555;
  margin-top:5px;
  line-height:1.4;
}

@media (min-width: 900px) {
  body { padding:12px; }

  .lista,
  .card,
  .total-box,
  .header {
    max-width:1100px;
    margin-left:auto;
    margin-right:auto;
  }

  .venta-card { padding:10px 12px; }
  .venta-producto { font-size:14px; }
}
</style>
</head>

<body>

<div class="header">
  <h2>Consultor Offline Ventas</h2>
</div>

<div id="loginBox" class="card">
  <label>Usuario</label>
  <input type="text" id="loginUsuario" placeholder="Ejemplo: fsalas">

  <label>Password</label>
  <input type="password" id="loginPassword" placeholder="Ingrese contraseña">

  <div class="botones">
    <button onclick="login()">Ingresar</button>
  </div>

  <div id="loginEstado" class="status">Ingrese usuario y password.</div>
</div>

<div id="cambioPasswordBox" class="card oculto">
  <h3 style="margin:0 0 8px 0;color:#0d6efd;font-size:16px;">Cambiar contraseña</h3>

  <div id="cambioPasswordAviso" class="status">Ingrese su contraseña actual y una nueva contraseña.</div>

  <label>Contraseña actual</label>
  <input type="password" id="passwordActual" placeholder="Contraseña actual">

  <label>Nueva contraseña</label>
  <input type="password" id="passwordNueva" placeholder="Mínimo 8 caracteres, mayúscula, minúscula y número">

  <label>Confirmar nueva contraseña</label>
  <input type="password" id="passwordNueva2" placeholder="Repita nueva contraseña">

  <div class="botones">
    <button onclick="guardarNuevaPassword()">Guardar contraseña</button>
    <button id="btnCancelarCambioPassword" class="secundario" onclick="cancelarCambioPassword()">Cancelar</button>
  </div>

  <div id="cambioPasswordEstado" class="status"></div>
</div>

<div id="appBox" class="oculto">

  <div class="card">
    <div class="usuario-box">
      <b>Usuario:</b> <span id="usuarioActual"></span><br>
      <b>Vendedor:</b> <span id="vendedorActual"></span><br>
      <b>Rol:</b> <span id="rolActual"></span>
    </div>

   <div id="adminBox" class="oculto">
  <label>Vendedor a consultar</label>
  <select id="slpCodeConsulta">
    <option value="">Seleccione vendedor</option>
  </select>

  <label>Usuario API a resetear</label>
  <input type="text" id="usuarioReset" placeholder="Ejemplo: aaguillon">

  <div class="botones">
    <button class="warning" onclick="resetPasswordAdmin()">Reset password vendedor</button>
  </div>
</div>
    <div class="botones">
      <button onclick="sincronizarDesdeApi()">Sincronizar SAP</button>
      <button class="danger" onclick="borrarBase()">Borrar base</button>
    </div>

    <div class="botones">
      <button class="secundario" onclick="mostrarCambioPassword(false)">Cambiar contraseña</button>
      <button class="secundario" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <div id="estado" class="status">Sin base local. Sincronice ventas desde SAP.</div>
  </div>

  <div class="card">
    <label>Fecha desde</label>
    <input type="date" id="fechaDesde">

    <label>Fecha hasta</label>
    <input type="date" id="fechaHasta">

    <label>Cliente</label>
    <input type="text" id="cliente" placeholder="Opcional">

    <label>Producto</label>
    <input type="text" id="producto" placeholder="Opcional">

    <label>Folio</label>
    <input type="text" id="folio" placeholder="Opcional">

    <div class="botones">
      <button onclick="buscar()">Buscar</button>
      <button class="secundario" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <div class="total-box">
    <div class="total-label">Total venta del despliegue</div>
    <div id="totalVenta" class="total-valor">$0</div>
    <div id="totalInfo" class="total-info">Sin resultados.</div>
  </div>

  <div id="lista" class="lista"></div>

</div>

<script>
let data = [];

const STORAGE_DATA = "ventas_offline_data_v1";
const STORAGE_FILTERS = "ventas_offline_filters_v1";
const STORAGE_LOGIN = "ventas_offline_login_v1";

const API_LOGIN = "https://api.cotaco.cl/api/login";
const API_SYNC = "https://api.cotaco.cl/api/ventas-historicas-sync";
const API_CAMBIAR_PASSWORD = "https://api.cotaco.cl/api/cambiar-password";
const API_ADMIN_RESET_PASSWORD = "https://api.cotaco.cl/api/admin/reset-password";
const API_VENDEDORES = "https://api.cotaco.cl/api/vendedores";

window.addEventListener("load", function(){
    cargarSesion();
    cargarBaseLocal();
    cargarFiltros();

["fechaDesde", "fechaHasta", "cliente", "producto", "folio", "slpCodeConsulta"].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener("input", guardarFiltros);
    });

    if (data.length > 0) {
        buscar();
    } else {
        render([], 0, 0);
    }
});

async function login(){
    const usuario = document.getElementById("loginUsuario").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    const estado = document.getElementById("loginEstado");

    if (!usuario || !password) {
        estado.textContent = "Debe ingresar usuario y password.";
        return;
    }

    estado.textContent = "Validando acceso...";

    try {
        const resp = await fetch(API_LOGIN, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                usuario: usuario,
                password: password
            })
        });

        if (!resp.ok) {
            throw new Error("Usuario o password inválido.");
        }

        const sesion = await resp.json();

        localStorage.setItem(STORAGE_LOGIN, JSON.stringify(sesion));

        aplicarSesion(sesion);

        estado.textContent = "Login correcto.";

    } catch (e) {
        estado.textContent = "Error de login.";
        alert(e.message);
    }
}

function cargarSesion(){
    const guardado = localStorage.getItem(STORAGE_LOGIN);

    if (!guardado) {
        document.getElementById("loginBox").classList.remove("oculto");
        document.getElementById("cambioPasswordBox").classList.add("oculto");
        document.getElementById("appBox").classList.add("oculto");
        return;
    }

    try {
        const sesion = JSON.parse(guardado);
        aplicarSesion(sesion);
    } catch {
        localStorage.removeItem(STORAGE_LOGIN);
        document.getElementById("loginBox").classList.remove("oculto");
        document.getElementById("cambioPasswordBox").classList.add("oculto");
        document.getElementById("appBox").classList.add("oculto");
    }
}

function aplicarSesion(sesion){
    const passwordTemporal = ((sesion.passwordTemporal || sesion.PasswordTemporal || "N") + "").toUpperCase();

    document.getElementById("loginBox").classList.add("oculto");

    if (passwordTemporal === "Y") {
        document.getElementById("appBox").classList.add("oculto");
        mostrarCambioPassword(true);
        return;
    }

    document.getElementById("cambioPasswordBox").classList.add("oculto");
    document.getElementById("appBox").classList.remove("oculto");

    document.getElementById("usuarioActual").textContent =
        sesion.usuario || sesion.Usuario || "";

    document.getElementById("vendedorActual").textContent =
        sesion.slpName || sesion.SlpName || "";

    document.getElementById("rolActual").textContent =
        sesion.rol || sesion.Rol || "";

    const rol = (sesion.rol || sesion.Rol || "").toUpperCase();

if (rol === "ADMIN") {
    document.getElementById("adminBox").classList.remove("oculto");
    cargarVendedoresAdmin();
} else {
    document.getElementById("adminBox").classList.add("oculto");
    document.getElementById("slpCodeConsulta").value = "";
}
}

function obtenerSesion(){
    try {
        return JSON.parse(localStorage.getItem(STORAGE_LOGIN) || "{}");
    } catch {
        return {};
    }
}

async function cargarVendedoresAdmin(){
    const sesion = obtenerSesion();
    const combo = document.getElementById("slpCodeConsulta");

    if (!sesion.token || !combo) return;

    combo.innerHTML = '<option value="">Cargando vendedores...</option>';

    try {
        const resp = await fetch(`${API_VENDEDORES}?token=${encodeURIComponent(sesion.token)}`);

        if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
        }

        const vendedores = await resp.json();

        combo.innerHTML = '<option value="">Seleccione vendedor</option>';

        vendedores.forEach(v => {
            const opt = document.createElement("option");
            opt.value = v.slpCode;
            opt.textContent = v.slpName;
            combo.appendChild(opt);
        });

        cargarFiltros();

    } catch (e) {
        combo.innerHTML = '<option value="">Error cargando vendedores</option>';
        alert("No se pudo cargar lista de vendedores.\n\n" + e.message);
    }
}


async function resetPasswordAdmin(){
    const sesion = obtenerSesion();
    const estado = document.getElementById("estado");
    const rol = (sesion.rol || sesion.Rol || "").toUpperCase();

    if (!sesion.token) {
        alert("Debe iniciar sesión como ADMIN.");
        cargarSesion();
        return;
    }

    if (rol !== "ADMIN") {
        alert("Solo un usuario ADMIN puede resetear passwords.");
        return;
    }

    const combo = document.getElementById("slpCodeConsulta");
    const slpCodeReset = combo ? combo.value : "";
    const vendedorReset = combo && combo.selectedIndex >= 0
        ? combo.options[combo.selectedIndex].textContent
        : "";

    if (!slpCodeReset) {
        alert("Debe seleccionar un vendedor para resetear password.");
        return;
    }

    const claveTemporal = "Cotaco2026";

    const mensajeConfirmacion =
        "¿Resetear password del vendedor?\n\n" +
        "Vendedor: " + vendedorReset + "\n" +
        "SlpCode: " + slpCodeReset + "\n\n" +
        "Se asignará clave temporal: " + claveTemporal + "\n\n" +
        "El usuario deberá cambiarla al ingresar.";

    if (!confirm(mensajeConfirmacion)) {
        return;
    }

    if (estado) estado.textContent = "Reseteando password de " + vendedorReset + "...";

    try {
        const resp = await fetch(API_ADMIN_RESET_PASSWORD, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                token: sesion.token,
                slpCode: Number(slpCodeReset),
                passwordTemporal: claveTemporal
            })
        });

        if (!resp.ok) {
            const txt = await resp.text();
            throw new Error(txt || "No se pudo resetear password.");
        }

        await resp.json();

        if (estado) {
            estado.textContent = "Password reseteado para " + vendedorReset + ". Clave temporal: " + claveTemporal;
        }

        alert("Password reseteado correctamente.

Vendedor: " + vendedorReset + "
Clave temporal: " + claveTemporal + "
El usuario deberá cambiarla al ingresar.");

    } catch (e) {
        if (estado) estado.textContent = "Error reseteando password.";
        alert("No se pudo resetear password.

" + e.message);
    }
}

function cerrarSesion(){
    if (!confirm("¿Desea cerrar sesión?")) return;

    const estado = document.getElementById("estado");
    if (estado) estado.textContent = "Sesión cerrada.";

    cerrarSesionSinConfirmar();
}

async function sincronizarDesdeApi(){
    const estado = document.getElementById("estado");
    const sesion = obtenerSesion();

    if (!sesion.token) {
        alert("Debe iniciar sesión.");
        cargarSesion();
        return;
    }

const rol = (sesion.rol || "").toUpperCase();
const slpCodeConsulta = document.getElementById("slpCodeConsulta").value;

if (rol === "ADMIN" && !slpCodeConsulta) {
    alert("Usuario ADMIN debe seleccionar vendedor a consultar.");
    estado.textContent = "Debe seleccionar vendedor a consultar.";
    return;
}

    const desde = document.getElementById('fechaDesde').value || "2024-07-01";
    const hasta = document.getElementById('fechaHasta').value || new Date().toISOString().substring(0,10);

    estado.textContent = "Sincronizando ventas desde SAP...";

    try {
        let url =
            `${API_SYNC}?token=${encodeURIComponent(sesion.token)}&desde=${encodeURIComponent(desde)}&hasta=${encodeURIComponent(hasta)}`;

if (rol === "ADMIN") {
    url += `&slpCodeConsulta=${encodeURIComponent(slpCodeConsulta)}`;
}
console.log("URL sync:", url);
console.log("Rol:", rol);
console.log("SlpCode consulta:", slpCodeConsulta);

        const resp = await fetch(url);

        if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
        }

        data = await resp.json();

        localStorage.setItem(STORAGE_DATA, JSON.stringify(data));

        estado.textContent =
            "Base sincronizada desde SAP: " +
            data.length.toLocaleString('es-CL') +
            " registros.";

        aplicarFechasBase();
        guardarFiltros();
        buscar();

    } catch (e) {
        estado.textContent = "Error sincronizando desde SAP.";
        alert("No se pudo sincronizar desde SAP.\n\n" + e.message);
    }
}

function cargarBaseLocal(){
    const base = localStorage.getItem(STORAGE_DATA);

    if (!base) {
        const estado = document.getElementById("estado");
        if (estado) estado.textContent = "Sin base local. Sincronice ventas desde SAP.";
        return;
    }

    try {
        data = JSON.parse(base);
        const estado = document.getElementById("estado");
        if (estado) {
            estado.textContent =
                "Base local cargada: " +
                data.length.toLocaleString('es-CL') +
                " registros.";
        }
    } catch {
        data = [];
        localStorage.removeItem(STORAGE_DATA);
        const estado = document.getElementById("estado");
        if (estado) estado.textContent = "Base local dañada. Sincronice nuevamente.";
    }
}

function borrarBase(){
    if (!confirm("¿Desea borrar la base local y filtros?")) return;

    localStorage.removeItem(STORAGE_DATA);
    localStorage.removeItem(STORAGE_FILTERS);

    data = [];

    document.getElementById('fechaDesde').value = '';
    document.getElementById('fechaHasta').value = '';
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';
  document.getElementById('slpCodeConsulta').value = '';

    document.getElementById("estado").textContent = "Base local eliminada.";
    render([], 0, 0);
}

function guardarFiltros(){
    const filtros = {
   slpCodeConsulta: document.getElementById('slpCodeConsulta').value,
        fechaDesde: document.getElementById('fechaDesde').value,
        fechaHasta: document.getElementById('fechaHasta').value,
        cliente: document.getElementById('cliente').value,
        producto: document.getElementById('producto').value,
        folio: document.getElementById('folio').value
    };

    try {
        localStorage.setItem(STORAGE_FILTERS, JSON.stringify(filtros));
    } catch {}
}

function cargarFiltros(){
    const guardado = localStorage.getItem(STORAGE_FILTERS);

    if (!guardado) {
        if (data.length > 0) aplicarFechasBase();
        return;
    }

    try {
        const filtros = JSON.parse(guardado);

  document.getElementById('slpCodeConsulta').value =
    filtros.slpCodeConsulta || '';

        document.getElementById('fechaDesde').value =
            filtros.fechaDesde || '';

        document.getElementById('fechaHasta').value =
            filtros.fechaHasta || '';

        document.getElementById('cliente').value =
            filtros.cliente || '';

        document.getElementById('producto').value =
            filtros.producto || '';

        document.getElementById('folio').value =
            filtros.folio || '';

    } catch {
        console.log("No se pudieron cargar filtros.");
    }
}

function aplicarFechasBase(){
    if (!data || data.length === 0) return;

    const fechas = data
        .map(x =>
            (x.Fecha || x.fecha || '')
            .toString()
            .substring(0,10)
        )
        .filter(Boolean)
        .sort();

    if (fechas.length > 0) {
        document.getElementById('fechaDesde').value = fechas[0];
        document.getElementById('fechaHasta').value =
            fechas[fechas.length - 1];
    }
}

function normalizar(txt){
    return (txt || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
}

function cumpleTexto(valor, busqueda){
    const palabras = normalizar(busqueda).split(/\s+/).filter(Boolean);
    const valorNorm = normalizar(valor);
    return palabras.length === 0 || palabras.every(p => valorNorm.includes(p));
}

function buscar(){
    guardarFiltros();

    const desde = document.getElementById('fechaDesde').value;
    const hasta = document.getElementById('fechaHasta').value;
    const cliente = document.getElementById('cliente').value;
    const producto = document.getElementById('producto').value;
    const folio = document.getElementById('folio').value;

    const filtrado = data.filter(x => {
        const fecha = (x.Fecha || x.fecha || '').toString().substring(0,10);
        const cardName = x.CardName || x.cardName || '';
        const itemName = x.ItemName || x.itemName || '';
        const folioDoc = x.Folio || x.folio || '';

        return (!desde || fecha >= desde)
            && (!hasta || fecha <= hasta)
            && cumpleTexto(cardName, cliente)
            && cumpleTexto(itemName, producto)
            && cumpleTexto(folioDoc, folio);
    });

    render(filtrado.slice(0,300), filtrado.length, calcularTotal(filtrado));

    document.getElementById("estado").textContent =
        data.length > 0
        ? "Resultados: " + filtrado.length.toLocaleString('es-CL') + ". Mostrando máximo 300."
        : "Sin datos sincronizados.";
}

function limpiar(){
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';
    aplicarFechasBase();
    guardarFiltros();
    buscar();
}

function calcularTotal(lista){
    return lista.reduce((acc, x) => {
        const n = Number(x.TotalLinea ?? x.totalLinea ?? 0);
        return acc + (isNaN(n) ? 0 : n);
    }, 0);
}

function render(lista, totalEncontrados = 0, totalVenta = 0){
    let html = "";

    if (!lista || lista.length === 0) {
        html = `<div class="venta-card">Sin resultados.</div>`;
    } else {
        lista.forEach(x => {
            const folio = x.Folio ?? x.folio ?? '';
            const fecha = x.Fecha ?? x.fecha ?? '';
            const cardName = x.CardName ?? x.cardName ?? '';
            const itemName = x.ItemName ?? x.itemName ?? '';
            const cantidad = x.Cantidad ?? x.cantidad ?? 0;
            const precio = x.Precio ?? x.precio ?? 0;
            const totalLinea = x.TotalLinea ?? x.totalLinea ?? 0;
            const vendedor = x.Vendedor ?? x.vendedor ?? '';
            const url = limpiarUrl(x.UrlPdf || x.urlPdf || x["Link PDF"] || x["Link_PDF"] || '');

            html += `
            <div class="venta-card">
              <div class="venta-top">
                <div>
                  <div class="venta-folio">Folio ${folio}</div>
                  <div class="venta-fecha">${fecha}</div>
                </div>
                ${
                  url
                  ? `<div class="acciones-link">
                       <button class="btn-copy" onclick="copiarLink('${esc(url)}')">Copiar link</button>
                     </div>`
                  : ''
                }
              </div>

              <div class="venta-cliente">${cardName}</div>
              <div class="venta-producto">${itemName}</div>

              <div class="venta-datos">
                <div class="dato"><b>Cant.:</b>${formato(cantidad)}</div>
                <div class="dato"><b>Precio:</b>${formato(precio)}</div>
                <div class="dato"><b>Total:</b><span class="total">${formato(totalLinea)}</span></div>
              </div>

              <div class="venta-vendedor">${vendedor}</div>
            </div>`;
        });
    }

    document.getElementById("lista").innerHTML = html;
    document.getElementById("totalVenta").textContent = "$" + formato(totalVenta);
    document.getElementById("totalInfo").textContent =
        totalEncontrados > 0
        ? "Registros encontrados: " + formato(totalEncontrados) + ". Mostrando: " + formato(lista.length) + "."
        : "Sin resultados.";
}

function esc(str){
    return (str || "")
        .toString()
        .replace(/&/g,"&amp;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function limpiarUrl(url){
    return (url || "")
        .toString()
        .trim()
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/^["']|["']$/g, '');
}

async function copiarLink(url){
    url = limpiarUrl(url);

    if(!url){
        alert("Sin link disponible.");
        return;
    }

    try {
        await navigator.clipboard.writeText(url);
        alert("Link copiado. Abra una pestaña del navegador y péguelo para visualizar el PDF.");
    } catch {
        alert("No se pudo copiar automáticamente. Revise el dato UrlPdf.");
    }
}

function formato(n){
    const num = Number(n || 0);
    if (isNaN(num)) return '';
    return num.toLocaleString('es-CL');
}
</script>
