<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
  padding:8px;
  color:#111;
}

.header, .card, .total-box, .lista {
  max-width:1100px;
  margin-left:auto;
  margin-right:auto;
}

.header {
  background:#0d6efd;
  color:white;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
}

.header h2 {
  margin:0;
  font-size:16px;
}

.card {
  background:white;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

label {
  font-weight:bold;
  display:block;
  margin-top:5px;
  font-size:12px;
}

input, button {
  width:100%;
  padding:8px;
  margin-top:4px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.secundario { background:#6c757d; }
.peligro { background:#dc3545; }

.botones {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.botones button { flex:1; }

.status {
  margin-top:5px;
  font-size:12px;
  color:#198754;
  font-weight:bold;
}

.total-box {
  background:white;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.total-label {
  font-size:12px;
  color:#555;
}

.total-valor {
  color:#0d6efd;
  font-size:20px;
  font-weight:bold;
}

.total-info {
  font-size:12px;
  color:#555;
}

.lista {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.venta-card {
  background:white;
  border-radius:10px;
  padding:9px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.venta-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:5px;
}

.venta-folio {
  font-size:14px;
  font-weight:bold;
}

.venta-fecha {
  font-size:12px;
  color:#666;
}

.venta-cliente {
  font-size:14px;
  font-weight:bold;
  margin-bottom:4px;
  line-height:1.2;
}

.venta-producto {
  font-size:13px;
  color:#333;
  line-height:1.2;
  margin-bottom:6px;
}

.venta-datos {
  display:flex;
  gap:6px;
  margin-bottom:6px;
}

.dato {
  flex:1;
  background:#f1f3f5;
  border-radius:7px;
  padding:6px;
  font-size:12px;
}

.dato b {
  display:block;
  font-size:10px;
  color:#666;
  margin-bottom:2px;
}

.total {
  color:#0d6efd;
  font-weight:bold;
}

.venta-vendedor {
  font-size:11px;
  color:#666;
  line-height:1.2;
}

.btn-pdf {
  background:#198754;
  color:white;
  padding:7px 10px;
  border:none;
  border-radius:7px;
  cursor:pointer;
  width:auto;
  font-size:13px;
}

@media (min-width: 900px) {
  body { padding:12px; }
  .venta-card { padding:10px 12px; }
  .venta-producto { font-size:14px; }
}
</style>
</head>

<body>

<div class="header">
  <h2>Consultor Offline Ventas</h2>
</div>

<div class="card">
  <label>Archivo JSON</label>
  <input type="file" id="fileInput" accept=".json">
  <div class="botones">
    <button class="peligro" onclick="borrarBase()">Borrar base local</button>
  </div>
  <div id="estado" class="status">Seleccione archivo JSON.</div>
</div>

<div class="card">
  <label>Fecha desde</label>
  <input type="date" id="fechaDesde">

  <label>Fecha hasta</label>
  <input type="date" id="fechaHasta">

  <label>Cliente</label>
  <input type="text" id="cliente" placeholder="Opcional">

  <label>Producto</label>
  <input type="text" id="producto" placeholder="Opcional">

  <label>Folio</label>
  <input type="text" id="folio" placeholder="Opcional">

  <div class="botones">
    <button onclick="buscar()">Buscar</button>
    <button class="secundario" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="total-box">
  <div class="total-label">Total venta del despliegue</div>
  <div id="totalVenta" class="total-valor">$0</div>
  <div id="totalInfo" class="total-info">Sin resultados.</div>
</
