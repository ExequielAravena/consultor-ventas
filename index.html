<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<style>
body { font-family: Arial; padding:15px; background:#f5f6f8; margin:0; }
h2 { font-size:22px; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

label {
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input,button {
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button { background:#0d6efd; color:white; border:none; cursor:pointer; }

.botones {
  display:flex;
  gap:10px;
}

.botones button {
  flex:1;
}

.secundario {
  background:#6c757d;
}

.status {
  margin-top:10px;
  font-weight:bold;
  color:#198754;
}

.total-box {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.total-valor {
  color:#0d6efd;
  font-size:24px;
  font-weight:bold;
}

.wrap { overflow-x:auto; }

table { width:100%; border-collapse:collapse; min-width:1100px; background:white; }
td,th { border:1px solid #ccc; padding:6px; }
th { background:#eee; }
td.num { text-align:right; }

.btn-pdf {
  background:#198754;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  width:auto;
}
</style>
</head>

<body>

<h2>Consultor Offline Ventas</h2>

<div class="card">
  <label>Archivo JSON de ventas</label>
  <input type="file" id="fileInput" accept=".json">
  <div id="estado" class="status">Seleccione archivo JSON.</div>
</div>

<div class="card">
  <label>Fecha desde</label>
  <input type="date" id="fechaDesde">

  <label>Fecha hasta</label>
  <input type="date" id="fechaHasta">

  <label>Cliente</label>
  <input type="text" id="cliente" placeholder="Opcional">

  <label>Producto</label>
  <input type="text" id="producto" placeholder="Opcional">

  <label>Folio</label>
  <input type="text" id="folio" placeholder="Opcional">

  <div class="botones">
    <button onclick="buscar()">Buscar</button>
    <button class="secundario" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="total-box">
  <div>Total venta del despliegue</div>
  <div id="totalVenta" class="total-valor">$0</div>
  <div id="totalInfo">Sin resultados.</div>
</div>

<div class="wrap">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Folio</th>
<th>Cliente</th>
<th>Producto</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Total</th>
<th>Vendedor</th>
<th>PDF</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

let data = [];

const API_PROXY = "https://marshy-unpack-unmade.ngrok-free.dev";

document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try {
            data = JSON.parse(e.target.result);

            document.getElementById("estado").textContent =
                "Archivo cargado: " + data.length.toLocaleString('es-CL') + " registros.";

            aplicarFechasBase();
            buscar();

        } catch {
            alert("Error leyendo archivo JSON.");
        }
    };

    reader.readAsText(file);
});

function aplicarFechasBase(){
    if (!data || data.length === 0) return;

    const fechas = data
        .map(x => (x.Fecha || '').toString().substring(0,10))
        .filter(Boolean)
        .sort();

    if (fechas.length > 0) {
        document.getElementById('fechaDesde').value = fechas[0];
        document.getElementById('fechaHasta').value = fechas[fechas.length - 1];
    }
}

function normalizar(txt){
    return (txt || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
}

function cumpleTexto(valor, busqueda){
    const palabras = normalizar(busqueda).split(/\s+/).filter(Boolean);
    const valorNorm = normalizar(valor);
    return palabras.length === 0 || palabras.every(p => valorNorm.includes(p));
}

function buscar(){
    const desde = document.getElementById('fechaDesde').value;
    const hasta = document.getElementById('fechaHasta').value;
    const cliente = document.getElementById('cliente').value;
    const producto = document.getElementById('producto').value;
    const folio = document.getElementById('folio').value;

    const filtrado = data.filter(x => {
        const fecha = (x.Fecha || '').toString().substring(0,10);

        return (!desde || fecha >= desde)
            && (!hasta || fecha <= hasta)
            && cumpleTexto(x.CardName, cliente)
            && cumpleTexto(x.ItemName, producto)
            && cumpleTexto(x.Folio, folio);
    });

    render(filtrado.slice(0,300), filtrado.length, calcularTotal(filtrado));

    document.getElementById("estado").textContent =
        "Resultados encontrados: " + filtrado.length.toLocaleString('es-CL') + ". Mostrando máximo 300.";
}

function limpiar(){
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';
    aplicarFechasBase();
    buscar();
}

function calcularTotal(lista){
    return lista.reduce((acc, x) => {
        const n = Number(x.TotalLinea || 0);
        return acc + (isNaN(n) ? 0 : n);
    }, 0);
}

function render(lista, totalEncontrados = 0, totalVenta = 0){

    let html = "";

    if (!lista || lista.length === 0) {
        html = `<tr><td colspan="9">Sin resultados.</td></tr>`;
    } else {
        lista.forEach(x => {

            const url = x.UrlPdf || x.urlPdf || x["Link PDF"] || '';

            html += `
            <tr>
                <td>${x.Fecha ?? ''}</td>
                <td>${x.Folio ?? ''}</td>
                <td>${x.CardName ?? ''}</td>
                <td>${x.ItemName ?? ''}</td>
                <td class="num">${formato(x.Cantidad)}</td>
                <td class="num">${formato(x.Precio)}</td>
                <td class="num"><b>${formato(x.TotalLinea)}</b></td>
                <td>${x.Vendedor ?? ''}</td>
                <td>
                    ${
                        url
                        ? `<button class="btn-pdf" onclick="abrirPdf('${esc(url)}')">Ver</button>`
                        : ''
                    }
                </td>
            </tr>`;
        });
    }

    document.getElementById("tabla").innerHTML = html;
    document.getElementById("totalVenta").textContent = "$" + formato(totalVenta);
    document.getElementById("totalInfo").textContent =
        totalEncontrados > 0
        ? "Registros encontrados: " + formato(totalEncontrados) + ". Mostrando: " + formato(lista.length) + "."
        : "Sin resultados.";
}

function esc(str){
    return (str || "")
        .toString()
        .replace(/&/g,"&amp;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function abrirPdf(url){

    if(!url){
        alert("Sin PDF");
        return;
    }

    url = url
        .toString()
        .trim()
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/^["']|["']$/g, '');

    const proxy = API_PROXY + "/pdf?url=" + encodeURIComponent(url);

    console.log("PDF proxy:", proxy);

    window.location.href = proxy;
}

function formato(n){
    const num = Number(n || 0);
    if (isNaN(num)) return '';
    return num.toLocaleString('es-CL');
}

</script>

</body>
</html>
