<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:,">
<meta name="theme-color" content="#0d6efd">

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
  padding:8px;
  color:#111;
}

.header {
  background:#0d6efd;
  color:white;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
}

.header h2 {
  margin:0;
  font-size:16px;
}

.card, .total-box, .venta-card {
  background:white;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card { padding:8px; margin-bottom:8px; }

label {
  font-weight:bold;
  display:block;
  margin-top:5px;
  font-size:12px;
}

input, button {
  width:100%;
  padding:8px;
  margin-top:4px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.secundario { background:#6c757d; }
.danger { background:#dc3545; }

.botones {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.botones button { flex:1; }

.status {
  margin-top:5px;
  font-size:12px;
  color:#198754;
  font-weight:bold;
}

.total-box {
  padding:8px;
  margin-bottom:8px;
}

.total-label { font-size:12px; color:#555; }
.total-valor { color:#0d6efd; font-size:20px; font-weight:bold; }
.total-info { font-size:12px; color:#555; }

.lista {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.venta-card { padding:9px; }

.venta-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:5px;
}

.venta-folio { font-size:14px; font-weight:bold; }
.venta-fecha { font-size:12px; color:#666; }

.venta-cliente {
  font-size:14px;
  font-weight:bold;
  margin-bottom:4px;
  line-height:1.2;
}

.venta-producto {
  font-size:13px;
  color:#333;
  line-height:1.2;
  margin-bottom:6px;
}

.venta-datos {
  display:flex;
  gap:12px;
  margin-bottom:6px;
  font-size:13px;
  flex-wrap:wrap;
}

.dato { font-size:12px; }

.dato b {
  display:inline;
  font-weight:normal;
  color:#666;
  margin-right:4px;
}

.total { color:#0d6efd; font-weight:bold; }

.venta-vendedor {
  font-size:11px;
  color:#666;
  line-height:1.2;
}

.acciones-link {
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.btn-copy {
  display:inline-block;
  text-decoration:none;
  color:white;
  padding:6px 10px;
  border-radius:7px;
  font-size:12px;
  font-weight:bold;
  line-height:1;
  white-space:nowrap;
  border:none;
  width:auto;
  margin-top:0;
  background:#6c757d;
  cursor:pointer;
}

@media (min-width: 900px) {
  body { padding:12px; }

  .lista,
  .card,
  .total-box,
  .header {
    max-width:1100px;
    margin-left:auto;
    margin-right:auto;
  }

  .venta-card { padding:10px 12px; }
  .venta-producto { font-size:14px; }
}
</style>
</head>

<body>

<div class="header">
  <h2>Consultor Offline Ventas</h2>
</div>

<div class="card">

  <label>Vendedor para sincronizar</label>
  <input
    type="text"
    id="vendedorSync"
    placeholder="Ejemplo: Fabiola, Juan, Zamora">

  <div class="botones">
    <button onclick="sincronizarDesdeApi()">
      Sincronizar SAP
    </button>

    <button class="secundario"
            onclick="recargarBase()">
      Recargar base
    </button>

    <button class="danger"
            onclick="borrarBase()">
      Borrar base
    </button>
  </div>

  <div id="estado" class="status">
    Sin base local. Sincronice ventas desde SAP.
  </div>

</div>

<div class="card">
  <label>Fecha desde</label>
  <input type="date" id="fechaDesde">

  <label>Fecha hasta</label>
  <input type="date" id="fechaHasta">

  <label>Cliente</label>
  <input type="text" id="cliente" placeholder="Opcional">

  <label>Producto</label>
  <input type="text" id="producto" placeholder="Opcional">

  <label>Folio</label>
  <input type="text" id="folio" placeholder="Opcional">

  <div class="botones">
    <button onclick="buscar()">Buscar</button>
    <button class="secundario" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="total-box">
  <div class="total-label">Total venta del despliegue</div>
  <div id="totalVenta" class="total-valor">$0</div>
  <div id="totalInfo" class="total-info">Sin resultados.</div>
</div>

<div id="lista" class="lista"></div>

<script>
let data = [];
const STORAGE_DATA = "ventas_offline_data_v1";
const STORAGE_FILTERS = "ventas_offline_filters_v1";

const API_SYNC = "https://api.cotaco.cl/api/ventas-historicas-sync";
  
window.addEventListener("load", function(){
    cargarBaseLocal();
    cargarFiltros();

    if (data.length > 0) {
        buscar();
    } else {
        render([], 0, 0);
    }
});



["fechaDesde", "fechaHasta", "cliente", "producto", "folio"].forEach(id => {
    document.getElementById(id).addEventListener("input", guardarFiltros);
});
async function sincronizarDesdeApi(){
    const estado = document.getElementById("estado");

 const vendedor = document.getElementById('vendedorSync').value.trim();
  if (!vendedor) {
    alert("Debe indicar vendedor para sincronizar.");
    estado.textContent = "Debe indicar vendedor.";
    return;
}
    const desde =
        document.getElementById('fechaDesde').value || "2024-07-01";

    const hasta =
        document.getElementById('fechaHasta').value ||
        new Date().toISOString().substring(0,10);

    estado.textContent = "Sincronizando ventas desde SAP...";

    try {

        const url =
            `${API_SYNC}?vendedor=${encodeURIComponent(vendedor)}&desde=${encodeURIComponent(desde)}&hasta=${encodeURIComponent(hasta)}`;

        const resp = await fetch(url);

        if (!resp.ok) {
            throw new Error("HTTP " + resp.status);
        }

        data = await resp.json();

        localStorage.setItem(
            STORAGE_DATA,
            JSON.stringify(data)
        );

        estado.textContent =
            "Base sincronizada desde SAP: " +
            data.length.toLocaleString('es-CL') +
            " registros.";

        aplicarFechasBase();
        guardarFiltros();
        buscar();

    } catch (e) {

        estado.textContent =
            "Error sincronizando desde SAP.";

        alert(
            "No se pudo sincronizar desde SAP.\n\n" +
            e.message
        );
    }
}
function cargarBaseLocal(){
    const base = localStorage.getItem(STORAGE_DATA);

    if (!base) {
        document.getElementById("estado").textContent = "Seleccione archivo JSON.";
        return;
    }

    try {
        data = JSON.parse(base);
        document.getElementById("estado").textContent =
            "Base local cargada: " + data.length.toLocaleString('es-CL') + " registros.";
    } catch {
        data = [];
        localStorage.removeItem(STORAGE_DATA);
        document.getElementById("estado").textContent = "Base local dañada. Cargue nuevamente el JSON.";
    }
}

function recargarBase(){
    cargarBaseLocal();

    if (data.length > 0) {
        if (!document.getElementById('fechaDesde').value || !document.getElementById('fechaHasta').value) {
            aplicarFechasBase();
        }
        buscar();
    }
}

function borrarBase(){
    if (!confirm("¿Desea borrar la base local y filtros?")) return;

    localStorage.removeItem(STORAGE_DATA);
    localStorage.removeItem(STORAGE_FILTERS);

    data = [];

    document.getElementById('fechaDesde').value = '';
    document.getElementById('fechaHasta').value = '';
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';

    document.getElementById("estado").textContent = "Base local eliminada.";
    render([], 0, 0);
}

function guardarFiltros(){
   const filtros = {
    vendedorSync: document.getElementById('vendedorSync').value,
    fechaDesde: document.getElementById('fechaDesde').value,
    fechaHasta: document.getElementById('fechaHasta').value,
    cliente: document.getElementById('cliente').value,
    producto: document.getElementById('producto').value,
    folio: document.getElementById('folio').value
};

    try {
        localStorage.setItem(STORAGE_FILTERS, JSON.stringify(filtros));
    } catch {}
}

function cargarFiltros(){
    const guardado = localStorage.getItem(STORAGE_FILTERS);

    if (!guardado) {
        if (data.length > 0) aplicarFechasBase();
        return;
    }

    try {
        const filtros = JSON.parse(guardado);

        document.getElementById('vendedorSync').value =
            filtros.vendedorSync || '';

        document.getElementById('fechaDesde').value =
            filtros.fechaDesde || '';

        document.getElementById('fechaHasta').value =
            filtros.fechaHasta || '';

        document.getElementById('cliente').value =
            filtros.cliente || '';

        document.getElementById('producto').value =
            filtros.producto || '';

        document.getElementById('folio').value =
            filtros.folio || '';

    } catch {
        console.log("No se pudieron cargar filtros.");
    }
}

function aplicarFechasBase(){
    if (!data || data.length === 0) return;

    const fechas = data
        .map(x =>
            (x.Fecha || x.fecha || '')
            .toString()
            .substring(0,10)
        )
        .filter(Boolean)
        .sort();

    if (fechas.length > 0) {
        document.getElementById('fechaDesde').value = fechas[0];
        document.getElementById('fechaHasta').value =
            fechas[fechas.length - 1];
    }
}

function normalizar(txt){
    return (txt || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
}

function cumpleTexto(valor, busqueda){
    const palabras = normalizar(busqueda).split(/\s+/).filter(Boolean);
    const valorNorm = normalizar(valor);
    return palabras.length === 0 || palabras.every(p => valorNorm.includes(p));
}

function buscar(){

    guardarFiltros();

    const desde =
        document.getElementById('fechaDesde').value;

    const hasta =
        document.getElementById('fechaHasta').value;

    const cliente =
        document.getElementById('cliente').value;

    const producto =
        document.getElementById('producto').value;

    const folio =
        document.getElementById('folio').value;

    const filtrado = data.filter(x => {

        const fecha =
            (x.Fecha || x.fecha || '')
            .toString()
            .substring(0,10);

        const cardName =
            x.CardName || x.cardName || '';

        const itemName =
            x.ItemName || x.itemName || '';

        const folioDoc =
            x.Folio || x.folio || '';

        return (!desde || fecha >= desde)
            && (!hasta || fecha <= hasta)
            && cumpleTexto(cardName, cliente)
            && cumpleTexto(itemName, producto)
            && cumpleTexto(folioDoc, folio);
    });

    render(
        filtrado.slice(0,300),
        filtrado.length,
        calcularTotal(filtrado)
    );

    document.getElementById("estado").textContent =
        data.length > 0
        ? "Resultados: " +
          filtrado.length.toLocaleString('es-CL') +
          ". Mostrando máximo 300."
        : "Sin datos sincronizados.";
}

function limpiar(){
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';
    aplicarFechasBase();
    guardarFiltros();
    buscar();
}

function calcularTotal(lista){
    return lista.reduce((acc, x) => {
        const n = Number(x.TotalLinea ?? x.totalLinea ?? 0);
        return acc + (isNaN(n) ? 0 : n);
    }, 0);
}

function render(lista, totalEncontrados = 0, totalVenta = 0){
    let html = "";

    if (!lista || lista.length === 0) {
        html = `<div class="venta-card">Sin resultados.</div>`;
    } else {
        lista.forEach(x => {
            const folio = x.Folio ?? x.folio ?? '';
            const fecha = x.Fecha ?? x.fecha ?? '';
            const cardName = x.CardName ?? x.cardName ?? '';
            const itemName = x.ItemName ?? x.itemName ?? '';
            const cantidad = x.Cantidad ?? x.cantidad ?? 0;
            const precio = x.Precio ?? x.precio ?? 0;
            const totalLinea = x.TotalLinea ?? x.totalLinea ?? 0;
            const vendedor = x.Vendedor ?? x.vendedor ?? '';
            const url = limpiarUrl(x.UrlPdf || x.urlPdf || x["Link PDF"] || x["Link_PDF"] || '');

            html += `
            <div class="venta-card">
              <div class="venta-top">
                <div>
                  <div class="venta-folio">Folio ${folio}</div>
                  <div class="venta-fecha">${fecha}</div>
                </div>
                ${
                  url
                  ? `<div class="acciones-link">
                       <button class="btn-copy" onclick="copiarLink('${esc(url)}')">Copiar link</button>
                     </div>`
                  : ''
                }
              </div>

              <div class="venta-cliente">${cardName}</div>
              <div class="venta-producto">${itemName}</div>

              <div class="venta-datos">
                <div class="dato"><b>Cant.:</b>${formato(cantidad)}</div>
                <div class="dato"><b>Precio:</b>${formato(precio)}</div>
                <div class="dato"><b>Total:</b><span class="total">${formato(totalLinea)}</span></div>
              </div>

              <div class="venta-vendedor">${vendedor}</div>
            </div>`;
        });
    }

    document.getElementById("lista").innerHTML = html;
    document.getElementById("totalVenta").textContent = "$" + formato(totalVenta);
    document.getElementById("totalInfo").textContent =
        totalEncontrados > 0
        ? "Registros encontrados: " + formato(totalEncontrados) + ". Mostrando: " + formato(lista.length) + "."
        : "Sin resultados.";
}
function esc(str){
    return (str || "")
        .toString()
        .replace(/&/g,"&amp;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function limpiarUrl(url){
    return (url || "")
        .toString()
        .trim()
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/^["']|["']$/g, '');
}

async function copiarLink(url){
    url = limpiarUrl(url);

    if(!url){
        alert("Sin link disponible.");
        return;
    }

    try {
        await navigator.clipboard.writeText(url);
        alert("Link copiado. Abra una pestaña del navegador y péguelo para visualizar el PDF.");
    } catch {
        alert("No se pudo copiar automáticamente. Mantenga presionado el link copiado o revise el dato UrlPdf.");
    }
}

function formato(n){
    const num = Number(n || 0);
    if (isNaN(num)) return '';
    return num.toLocaleString('es-CL');
}
</script>

</body>
</html>
