<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:,">
<meta name="theme-color" content="#0d6efd">

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
  padding:8px;
  color:#111;
}

.header {
  background:#0d6efd;
  color:white;
  padding:8px 10px;
  border-radius:10px;
  margin-bottom:8px;
}

.header h2 {
  margin:0;
  font-size:16px;
}

.card {
  background:white;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

label {
  font-weight:bold;
  display:block;
  margin-top:5px;
  font-size:12px;
}

input, button {
  width:100%;
  padding:8px;
  margin-top:4px;
  font-size:13px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.secundario { background:#6c757d; }
.danger { background:#dc3545; }

.botones {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.botones button { flex:1; }

.status {
  margin-top:5px;
  font-size:12px;
  color:#198754;
  font-weight:bold;
}

.total-box {
  background:white;
  padding:8px;
  border-radius:10px;
  margin-bottom:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.total-label {
  font-size:12px;
  color:#555;
}

.total-valor {
  color:#0d6efd;
  font-size:20px;
  font-weight:bold;
}

.total-info {
  font-size:12px;
  color:#555;
}

.lista {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.venta-card {
  background:white;
  border-radius:10px;
  padding:9px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.venta-top {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
  margin-bottom:5px;
}

.venta-folio { font-size:14px; font-weight:bold; }
.venta-fecha { font-size:12px; color:#666; }
.venta-cliente { font-size:14px; font-weight:bold; margin-bottom:4px; }
.venta-producto { font-size:13px; margin-bottom:6px; }

.venta-datos {
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  font-size:13px;
}

.dato { font-size:12px; }
.dato b { color:#666; margin-right:4px; }

.total { color:#0d6efd; font-weight:bold; }

.btn-pdf {
  background:#198754;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:7px;
  cursor:pointer;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Consultor Offline Ventas</h2>
</div>

<div class="card">
  <label>Archivo JSON</label>
  <input type="file" id="fileInput" accept=".json">

  <div class="botones">
    <button class="secundario" onclick="recargarBase()">Recargar base</button>
    <button class="danger" onclick="borrarBase()">Borrar base</button>
  </div>

  <div id="estado" class="status">Seleccione archivo JSON.</div>
</div>

<div class="card">
  <label>Fecha desde</label>
  <input type="date" id="fechaDesde">

  <label>Fecha hasta</label>
  <input type="date" id="fechaHasta">

  <label>Cliente</label>
  <input type="text" id="cliente">

  <label>Producto</label>
  <input type="text" id="producto">

  <label>Folio</label>
  <input type="text" id="folio">

  <div class="botones">
    <button onclick="buscar()">Buscar</button>
    <button class="secundario" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="total-box">
  <div class="total-label">Total venta</div>
  <div id="totalVenta" class="total-valor">$0</div>
</div>

<div id="lista" class="lista"></div>

<script>
let data = [];

const API_PROXY = "http://191.0.0.51:5178";
const STORAGE_DATA = "ventas_offline_data_v1";

// ========================
// CARGA JSON
// ========================
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try {
            data = JSON.parse(e.target.result);

            // 🔥 CONTROL DE MEMORIA
            try {
                localStorage.setItem(STORAGE_DATA, JSON.stringify(data));
            } catch {
                localStorage.removeItem(STORAGE_DATA);
                alert("Archivo muy grande: se cargará solo en esta sesión.");
            }

            document.getElementById("estado").textContent =
                "Cargado: " + data.length.toLocaleString('es-CL');

            buscar();

        } catch {
            alert("Error leyendo JSON");
        }
    };

    reader.readAsText(file);
});

// ========================
// BUSCAR
// ========================
function buscar(){
    const cliente = document.getElementById('cliente').value.toLowerCase();

    const lista = data.filter(x =>
        !cliente || (x.CardName || "").toLowerCase().includes(cliente)
    );

    render(lista);
}

// ========================
// RENDER
// ========================
function render(lista){
    let html = "";

    lista.slice(0,300).forEach(x => {
        const url = x.UrlPdf || x["Link_PDF"] || '';

        html += `
        <div class="venta-card">
            <div class="venta-top">
                <div>
                    <div class="venta-folio">${x.Folio}</div>
                    <div class="venta-fecha">${x.Fecha}</div>
                </div>
                ${url ? `<button class="btn-pdf" onclick="abrirPdf('${url}')">PDF</button>` : ''}
            </div>

            <div class="venta-cliente">${x.CardName}</div>
            <div class="venta-producto">${x.ItemName}</div>

            <div class="venta-datos">
                <div class="dato"><b>Cant:</b>${x.Cantidad}</div>
                <div class="dato"><b>Total:</b>${x.TotalLinea}</div>
            </div>
        </div>`;
    });

    document.getElementById("lista").innerHTML = html;
}

// ========================
// PDF
// ========================
function abrirPdf(url){
    const proxy = API_PROXY + "/pdf?url=" + encodeURIComponent(url);
    window.open(proxy, "_blank");
}
</script>

</body>
</html>
