<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<style>
body { font-family: Arial; padding:15px; background:#f5f6f8; margin:0; }
h2 { font-size:22px; }

.card { background:white; padding:15px; border-radius:10px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }

input,button {
  width:100%;
  padding:10px;
  margin-top:8px;
  font-size:15px;
  border-radius:6px;
  border:1px solid #ccc;
}

button { background:#0d6efd; color:white; border:none; }

.wrap { overflow-x:auto; }

table { width:100%; border-collapse:collapse; min-width:1100px; }
td,th { border:1px solid #ccc; padding:6px; }
th { background:#eee; }

.btn-pdf {
  background:#198754;
  color:white;
  padding:6px 10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Consultor Offline Ventas</h2>

<div class="card">
  <input type="file" id="fileInput" accept=".json">
  <button onclick="buscar()">Buscar</button>
</div>

<div class="wrap">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Folio</th>
<th>Cliente</th>
<th>Producto</th>
<th>Total</th>
<th>PDF</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<script>

let data = [];

document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        data = JSON.parse(e.target.result);
        render(data);
    };

    reader.readAsText(file);
});

function buscar(){
    render(data);
}

function render(lista){

    let html = "";

    lista.slice(0,100).forEach(x => {

        const url = x.UrlPdf || x.urlPdf || x["Link PDF"] || '';

        html += `
        <tr>
            <td>${x.Fecha ?? ''}</td>
            <td>${x.Folio ?? ''}</td>
            <td>${x.CardName ?? ''}</td>
            <td>${x.ItemName ?? ''}</td>
            <td>${formato(x.TotalLinea)}</td>
            <td>
                ${
                    url
                    ? `<button class="btn-pdf" onclick="abrirPdf('${esc(url)}')">Ver</button>`
                    : ''
                }
            </td>
        </tr>`;
    });

    document.getElementById("tabla").innerHTML = html;
}

function esc(str){
    return (str || "")
        .toString()
        .replace(/&/g,"&amp;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function abrirPdf(url){

    if(!url){
        alert("Sin PDF");
        return;
    }

    url = url
        .toString()
        .trim()
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/^["']|["']$/g, '');

    const proxy = "http://192.168.11.86:5178/pdf?url=" + encodeURIComponent(url);

    console.log("PDF proxy:", proxy);

    window.location.href = proxy;
}

function formato(n){
    return Number(n || 0).toLocaleString('es-CL');
}

</script>

</body>
</html>
