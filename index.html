<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consultor Offline Ventas</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<style>
* { box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#f5f6f8;
  margin:0;
  padding:10px;
  color:#111;
}

.header {
  background:#0d6efd;
  color:white;
  padding:10px 12px;
  border-radius:10px;
  margin-bottom:10px;
}

.header h2 {
  margin:0;
  font-size:18px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

label {
  font-weight:bold;
  display:block;
  margin-top:6px;
  font-size:13px;
}

input,button {
  width:100%;
  padding:9px;
  margin-top:5px;
  font-size:14px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  background:#0d6efd;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.secundario { background:#6c757d; }

.botones {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.botones button { flex:1; }

.status {
  margin-top:6px;
  font-size:12px;
  color:#198754;
  font-weight:bold;
}

.total-box {
  background:white;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.total-label {
  font-size:13px;
  color:#555;
}

.total-valor {
  color:#0d6efd;
  font-size:22px;
  font-weight:bold;
}

.total-info {
  font-size:12px;
  color:#555;
}

.lista {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
  gap:10px;
}

.venta-card {
  background:white;
  border-radius:12px;
  padding:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.venta-top {
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:8px;
}

.venta-folio {
  font-size:15px;
  font-weight:bold;
}

.venta-fecha {
  font-size:12px;
  color:#666;
  margin-top:2px;
}

.venta-cliente {
  font-size:15px;
  font-weight:bold;
  margin-bottom:6px;
  line-height:1.25;
}

.venta-producto {
  font-size:14px;
  color:#333;
  line-height:1.3;
  margin-bottom:10px;
}

.venta-datos {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
  margin-bottom:10px;
}

.dato {
  background:#f1f3f5;
  border-radius:8px;
  padding:8px;
  font-size:13px;
}

.dato b {
  display:block;
  font-size:11px;
  color:#666;
  margin-bottom:3px;
}

.total {
  color:#0d6efd;
  font-weight:bold;
}

.venta-vendedor {
  font-size:12px;
  color:#666;
  line-height:1.25;
  margin-bottom:8px;
}

.btn-pdf {
  background:#198754;
  color:white;
  padding:9px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  width:100%;
  font-size:14px;
}

@media (max-width: 768px) {
  body { padding:8px; }
  .header { padding:8px 10px; }
  .header h2 { font-size:16px; }
  .card { padding:9px; }
  input,button { padding:8px; font-size:13px; }
  .lista { grid-template-columns:1fr; }
  .venta-datos { grid-template-columns:repeat(3, 1fr); gap:6px; }
  .dato { padding:6px; font-size:12px; }
  .total-valor { font-size:20px; }
}
</style>
</head>

<body>

<div class="header">
  <h2>Consultor Offline Ventas</h2>
</div>

<div class="card">
  <label>Archivo JSON</label>
  <input type="file" id="fileInput" accept=".json">
  <div id="estado" class="status">Seleccione archivo JSON.</div>
</div>

<div class="card">
  <label>Fecha desde</label>
  <input type="date" id="fechaDesde">

  <label>Fecha hasta</label>
  <input type="date" id="fechaHasta">

  <label>Cliente</label>
  <input type="text" id="cliente" placeholder="Opcional">

  <label>Producto</label>
  <input type="text" id="producto" placeholder="Opcional">

  <label>Folio</label>
  <input type="text" id="folio" placeholder="Opcional">

  <div class="botones">
    <button onclick="buscar()">Buscar</button>
    <button class="secundario" onclick="limpiar()">Limpiar</button>
  </div>
</div>

<div class="total-box">
  <div class="total-label">Total venta del despliegue</div>
  <div id="totalVenta" class="total-valor">$0</div>
  <div id="totalInfo" class="total-info">Sin resultados.</div>
</div>

<div id="lista" class="lista"></div>

<script>

let data = [];

const API_PROXY = "https://marshy-unpack-unmade.ngrok-free.dev";

document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        try {
            data = JSON.parse(e.target.result);

            document.getElementById("estado").textContent =
                "Archivo cargado: " + data.length.toLocaleString('es-CL') + " registros.";

            aplicarFechasBase();
            buscar();

        } catch {
            alert("Error leyendo archivo JSON.");
        }
    };

    reader.readAsText(file);
});

function aplicarFechasBase(){
    if (!data || data.length === 0) return;

    const fechas = data
        .map(x => (x.Fecha || '').toString().substring(0,10))
        .filter(Boolean)
        .sort();

    if (fechas.length > 0) {
        document.getElementById('fechaDesde').value = fechas[0];
        document.getElementById('fechaHasta').value = fechas[fechas.length - 1];
    }
}

function normalizar(txt){
    return (txt || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
}

function cumpleTexto(valor, busqueda){
    const palabras = normalizar(busqueda).split(/\s+/).filter(Boolean);
    const valorNorm = normalizar(valor);
    return palabras.length === 0 || palabras.every(p => valorNorm.includes(p));
}

function buscar(){
    const desde = document.getElementById('fechaDesde').value;
    const hasta = document.getElementById('fechaHasta').value;
    const cliente = document.getElementById('cliente').value;
    const producto = document.getElementById('producto').value;
    const folio = document.getElementById('folio').value;

    const filtrado = data.filter(x => {
        const fecha = (x.Fecha || '').toString().substring(0,10);

        return (!desde || fecha >= desde)
            && (!hasta || fecha <= hasta)
            && cumpleTexto(x.CardName, cliente)
            && cumpleTexto(x.ItemName, producto)
            && cumpleTexto(x.Folio, folio);
    });

    render(filtrado.slice(0,300), filtrado.length, calcularTotal(filtrado));

    document.getElementById("estado").textContent =
        "Resultados: " + filtrado.length.toLocaleString('es-CL') + ". Mostrando máximo 300.";
}

function limpiar(){
    document.getElementById('cliente').value = '';
    document.getElementById('producto').value = '';
    document.getElementById('folio').value = '';
    aplicarFechasBase();
    buscar();
}

function calcularTotal(lista){
    return lista.reduce((acc, x) => {
        const n = Number(x.TotalLinea || 0);
        return acc + (isNaN(n) ? 0 : n);
    }, 0);
}

function render(lista, totalEncontrados = 0, totalVenta = 0){
    let html = "";

    if (!lista || lista.length === 0) {
        html = `<div class="venta-card">Sin resultados.</div>`;
    } else {
        lista.forEach(x => {
            const url = x.UrlPdf || x.urlPdf || x["Link PDF"] || '';

            html += `
            <div class="venta-card">
              <div class="venta-top">
                <div>
                  <div class="venta-folio">Folio ${x.Folio ?? ''}</div>
                  <div class="venta-fecha">${x.Fecha ?? ''}</div>
                </div>
                ${url ? `<button class="btn-pdf" style="width:auto;" onclick="abrirPdf('${esc(url)}')">PDF</button>` : ''}
              </div>

              <div class="venta-cliente">${x.CardName ?? ''}</div>
              <div class="venta-producto">${x.ItemName ?? ''}</div>

              <div class="venta-datos">
                <div class="dato"><b>Cantidad</b>${formato(x.Cantidad)}</div>
                <div class="dato"><b>Precio</b>${formato(x.Precio)}</div>
                <div class="dato"><b>Total</b><span class="total">${formato(x.TotalLinea)}</span></div>
              </div>

              <div class="venta-vendedor">${x.Vendedor ?? ''}</div>

              ${url ? `<button class="btn-pdf" onclick="abrirPdf('${esc(url)}')">Ver PDF</button>` : ''}
            </div>`;
        });
    }

    document.getElementById("lista").innerHTML = html;
    document.getElementById("totalVenta").textContent = "$" + formato(totalVenta);
    document.getElementById("totalInfo").textContent =
        totalEncontrados > 0
        ? "Registros encontrados: " + formato(totalEncontrados) + ". Mostrando: " + formato(lista.length) + "."
        : "Sin resultados.";
}

function esc(str){
    return (str || "")
        .toString()
        .replace(/&/g,"&amp;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#39;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;");
}

function abrirPdf(url){
    if(!url){
        alert("Sin PDF");
        return;
    }

    url = url
        .toString()
        .trim()
        .replace(/&amp;/g, '&')
        .replace(/&#39;/g, "'")
        .replace(/^["']|["']$/g, '');

    const proxy = API_PROXY + "/pdf?url=" + encodeURIComponent(url);

    window.location.href = proxy;
}

function formato(n){
    const num = Number(n || 0);
    if (isNaN(num)) return '';
    return num.toLocaleString('es-CL');
}

</script>

</body>
</html>
